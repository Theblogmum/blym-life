<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Blym</title>
    <style>
      :root {
        color-scheme: light;
        background: #fff7ed;
        color: #1f2933;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        background: #fff7ed;
      }
      .splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #fff7ed;
        z-index: 1;
      }
      .splash img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        border-radius: 22px;
        display: block;
      }
      iframe {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff7ed;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="splash" aria-hidden="true">
      <img src="./blym-icon.png" alt="" />
    </div>
    <iframe title="Blym" src="https://www.blym.life/"></iframe>
  </body>
</html>
