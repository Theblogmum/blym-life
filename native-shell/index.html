<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Blym</title>
    <style>
      :root {
        color-scheme: light;
        background: #fff7ed;
        color: #1f2933;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }
      main {
        display: grid;
        gap: 14px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #5f6b7a;
      }
      iframe {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff7ed;
      }
    </style>
  </head>
  <body>
    <main aria-hidden="true">
      <h1>Blym</h1>
      <p>Opening your app…</p>
    </main>
    <iframe title="Blym" src="https://www.blym.life/"></iframe>
  </body>
</html>
